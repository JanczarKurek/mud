# Sparse Poisson-driven ripple animation. Uncomment once `ripple.png` (a
# horizontal strip of 16x16 frames) has been authored under this directory.
# The Bevy system spawns one transient overlay sprite on a random visible
# water tile every ~1/(rate_per_tile_per_second × visible_water_tile_count)
# seconds, plays the strip non-looping, then despawns. See
# `src/world/floor_animation.rs`.
