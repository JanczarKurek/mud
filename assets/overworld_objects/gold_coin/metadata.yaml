extends: consumable
name: Gold Coin
weight: 0.005
max_stack_size: 100
description:
  - text: A bright gold coin worth twenty silver.
    stack_size: [1, 1]
  - text: "{count_written} gold coins."
    stack_size: [2, 9]
  - text: "A small handful of gold coins ({count})."
    stack_size: [10, 19]
  - text: "A pile of gold coins ({count})."
    stack_size: [20, 49]
  - text: "A heavy mound of gold coins ({count})."
    stack_size: [50, ~]
render:
  z_index: 0.24
  debug_color: [240, 200, 64]
  debug_size: 0.40
  sprite_path: overworld_objects/gold_coin/1.png
