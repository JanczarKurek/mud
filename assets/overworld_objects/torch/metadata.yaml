extends: static_world
name: Wall Torch
description: A wall torch sconce.
colliding: false
render:
  z_index: 0.30
  debug_color: [220, 130, 40]
  debug_size: 0.55
  sprite_path: overworld_objects/torch/unlit.png
states:
  unlit:
    sprite_path: overworld_objects/torch/unlit.png
    clear_light: true
  lit:
    sprite_path: overworld_objects/torch/lit_sheet.png
    light: { color: [255, 180, 90], radius: 4.5, intensity: 0.9 }
    animation:
      sheet_path: overworld_objects/torch/lit_sheet.png
      frame_width: 32
      frame_height: 32
      sheet_columns: 4
      sheet_rows: 1
      clips:
        idle:
          row: 0
          start_col: 0
          frame_count: 4
          fps: 8.0
          looping: true
initial_state: unlit
interactions:
  - verb: light
    label: Light
    from: [unlit]
    to: lit
  - verb: extinguish
    label: Extinguish
    from: [lit]
    to: unlit
