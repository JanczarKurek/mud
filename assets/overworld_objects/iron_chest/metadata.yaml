extends: movable_obstacle
name: Iron Chest
description: A heavy iron chest.
container_capacity: 12
colliding: true
render:
  z_index: 0.25
  debug_color: [120, 120, 130]
  debug_size: 0.78
  sprite_path: overworld_objects/iron_chest/closed.png
  sprite_width_tiles: 1.0
  sprite_height_tiles: 0.5
  display_height: 0.4
  walkable_surface: true
  stack_order: 20
states:
  locked:
    sprite_path: overworld_objects/iron_chest/closed.png
  closed:
    sprite_path: overworld_objects/iron_chest/closed.png
  open:
    sprite_path: overworld_objects/iron_chest/open.png
initial_state: closed
lock:
  lock_id: 7
  pick_dc: 12
  force_dc: 20
interactions:
  - verb: pick_lock
    label: Pick Lock
    from: [locked]
    to: closed
    skill_gate:
      skill: Thievery
      dc: from_lock_pick
  - verb: force_lock
    label: Force Lock
    from: [locked]
    to: closed
    skill_gate:
      skill: Athletics
      dc: from_lock_force
  - verb: use_key
    label: Use Key
    from: [locked]
    to: closed
    key_gate:
      source: from_lock
