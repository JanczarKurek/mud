extends: consumable
name: Silver Coin
weight: 0.005
max_stack_size: 100
description:
  - text: A polished silver coin worth twelve copper.
    stack_size: [1, 1]
  - text: "{count_written} silver coins."
    stack_size: [2, 9]
  - text: "A small handful of silver coins ({count})."
    stack_size: [10, 19]
  - text: "A pile of silver coins ({count})."
    stack_size: [20, 49]
  - text: "A heavy mound of silver coins ({count})."
    stack_size: [50, ~]
render:
  z_index: 0.24
  debug_color: [192, 192, 200]
  debug_size: 0.40
  sprite_path: overworld_objects/silver_coin/1.png
