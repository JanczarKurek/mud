extends: static_world
name: Player
description: Placeholder player character sprite for early movement and world tests.
render:
  z_index: 1.0
  debug_color: [214, 194, 96]
  debug_size: 0.95
  sprite_path: overworld_objects/player/sprite_large.png
  y_sort: true
  animation:
    sheet_path: overworld_objects/player/sheet.png
    frame_width: 32
    frame_height: 48
    sheet_columns: 4
    sheet_rows: 2
    clips:
      idle:
        row: 0
        start_col: 0
        frame_count: 4
        fps: 3.0
        looping: true
      walk:
        row: 1
        start_col: 0
        frame_count: 4
        fps: 8.0
        looping: true
