extends: obstacle
name: Water
description: Deep water that blocks movement.
render:
  z_index: 0.1
  debug_color: [41, 97, 189]
  debug_size: 1.0
  sprite_path: overworld_objects/water/sprite.png
  animation:
    sheet_path: overworld_objects/water/sheet.png
    frame_width: 48
    frame_height: 48
    sheet_columns: 4
    sheet_rows: 1
    clips:
      idle:
        row: 0
        start_col: 0
        frame_count: 4
        fps: 4.0
        looping: true
