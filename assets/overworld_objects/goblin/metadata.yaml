extends: npc
name: Goblin
description: A wiry green nuisance with a mean stare and quick hands.
level: 2
loot:
  corpse_despawn_seconds: 60
  drops:
    - type_id: apple
      quantity: 1
      probability: 0.5
stats:
  strength: 8
  agility: 11
  constitution: 8
  willpower: 6
  charisma: 4
  focus: 7
damage: "1d4+strength/5"
attack_profile:
  kind: melee
  damage_type: cut
hp: "1d6+25+constitution*3"
npc_behavior:
  step_interval_seconds: 0.9
  detect_distance_tiles: 5
  disengage_distance_tiles: 8
render:
  debug_color:
  - 92
  - 156
  - 68
  debug_size: 0.92
  sprite_path: overworld_objects/goblin/sprite.png
  y_sort: true
  animation:
    sheet_path: overworld_objects/goblin/sheet.png
    frame_width: 32
    frame_height: 48
    sheet_columns: 4
    sheet_rows: 2
    clips:
      idle:
        row: 0
        start_col: 0
        frame_count: 4
        fps: 3.0
        looping: true
      walk:
        row: 1
        start_col: 0
        frame_count: 4
        fps: 16.0
        looping: true
