objects:
  # IDs are in the 10000+ range so that anonymous tile objects (which get
  # IDs from max_explicit+1 = 11000 upward) never collide with
  # starter_cellar (1200-1202) or underworld (2000-2007).

  # ── VILLAGE ZONE ────────────────────────────────────────────────────────

  # Inn barrel with potion + apple
  - id: 10100
    type: barrel
    placement: {x: 4, y: 4}
    contents: [10101, 10102]
  - id: 10101
    type: potion
  - id: 10102
    type: apple

  # Market — equipment on ground
  - id: 10110
    type: bronze_sword
    placement: {x: 13, y: 3}
  - id: 10111
    type: leather_armor
    placement: {x: 15, y: 3}

  # Storage hut — gear
  - id: 10120
    type: canvas_backpack
    placement: {x: 4, y: 15}
  - id: 10121
    type: leather_helmet
    placement: {x: 6, y: 15}

  # Village well
  - id: 10130
    type: well
    placement: {x: 10, y: 9}

  # Village campfire
  - id: 10131
    type: campfire
    placement: {x: 10, y: 11}

  # Village south sign
  - id: 10132
    type: sign_post
    placement: {x: 5, y: 21}
    properties:
      text: "South road leads to the old dungeon. Adventurers beware!"

  # Villagers
  - id: 10140
    type: villager
    placement: {x: 9, y: 8}
    behavior:
      kind: roam
      step_interval_seconds: 1.2
      bounds: {min_x: 7, min_y: 7, max_x: 14, max_y: 13}
  - id: 10141
    type: villager
    placement: {x: 14, y: 12}
    behavior:
      kind: roam
      step_interval_seconds: 1.0
      bounds: {min_x: 11, min_y: 9, max_x: 18, max_y: 15}

  # Player spawn
  - id: 10999
    type: player
    placement: {x: 10, y: 18}

  # ── MEADOW ZONE ─────────────────────────────────────────────────────────

  # Cellar portal sign
  - id: 10150
    type: sign_post
    placement: {x: 34, y: 19}
    properties:
      text: "Step here to enter the cellar."

  # Scattered meadow loot
  - id: 10151
    type: silver_ring
    placement: {x: 38, y: 8}
  - id: 10152
    type: potion
    placement: {x: 36, y: 14}
  - id: 10153
    type: scroll
    placement: {x: 40, y: 16}
    properties:
      spell_id: lesser_heal

  # ── FOREST ZONE ─────────────────────────────────────────────────────────

  - id: 10160
    type: apple
    placement: {x: 52, y: 6}
  - id: 10161
    type: apple
    placement: {x: 60, y: 14}
  - id: 10162
    type: copper_amulet
    placement: {x: 64, y: 10}
  - id: 10163
    type: leather_legs
    placement: {x: 58, y: 20}

  # Forest goblin
  - id: 10164
    type: goblin
    placement: {x: 48, y: 10}
    behavior:
      kind: roam_and_chase
      step_interval_seconds: 0.9
      detect_distance_tiles: 4
      disengage_distance_tiles: 6
      bounds: {min_x: 46, min_y: 5, max_x: 55, max_y: 18}

  # ── DUNGEON APPROACH ────────────────────────────────────────────────────

  # Sinkhole (portal trigger object)
  - id: 10170
    type: sinkhole
    placement: {x: 35, y: 46}

  # Portal arch visual
  - id: 10171
    type: portal_arch
    placement: {x: 35, y: 44}

  # Dungeon warning sign
  - id: 10172
    type: sign_post
    placement: {x: 33, y: 43}
    properties:
      text: "The sinkhole ahead leads deep underground. Return is not guaranteed."

  # Abandoned campfire near dungeon
  - id: 10173
    type: campfire
    placement: {x: 32, y: 41}

  # ── GOBLIN CAMP ─────────────────────────────────────────────────────────

  # Camp campfire
  - id: 10180
    type: campfire
    placement: {x: 56, y: 38}

  # Loot barrel
  - id: 10181
    type: barrel
    placement: {x: 55, y: 36}
    contents: [10182, 10183, 10184]
  - id: 10182
    type: potion
  - id: 10183
    type: scroll
    properties:
      spell_id: spark_bolt
  - id: 10184
    type: potion

  # Loot on ground
  - id: 10185
    type: bronze_sword
    placement: {x: 60, y: 33}
  - id: 10186
    type: leather_legs
    placement: {x: 62, y: 40}
  - id: 10187
    type: traveler_boots
    placement: {x: 50, y: 42}
  - id: 10188
    type: wooden_shield
    placement: {x: 58, y: 42}

  # Goblin NPCs
  - id: 10190
    type: goblin
    placement: {x: 52, y: 34}
    behavior:
      kind: roam_and_chase
      step_interval_seconds: 0.85
      detect_distance_tiles: 5
      disengage_distance_tiles: 8
      bounds: {min_x: 46, min_y: 29, max_x: 60, max_y: 42}
  - id: 10191
    type: goblin
    placement: {x: 61, y: 38}
    behavior:
      kind: roam_and_chase
      step_interval_seconds: 0.90
      detect_distance_tiles: 5
      disengage_distance_tiles: 7
      bounds: {min_x: 50, min_y: 29, max_x: 67, max_y: 46}
  - id: 10192
    type: goblin
    placement: {x: 54, y: 44}
    behavior:
      kind: roam_and_chase
      step_interval_seconds: 1.0
      detect_distance_tiles: 4
      disengage_distance_tiles: 6
      bounds: {min_x: 46, min_y: 38, max_x: 64, max_y: 48}
