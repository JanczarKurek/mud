    source: {x: 35, y: 20}
    destination_space_id: starter_cellar
    destination_tile: {x: 6, y: 1}
    destination_permanence: ephemeral
  - id: underworld_sinkhole
    source: {x: 35, y: 46}
    destination_space_id: underworld
    destination_tile: {x: 3, y: 14}

