authored_id: starter_cellar
permanence: ephemeral
width: 12
height: 10
fill_floor_type: grass
lighting:
  outdoor_ambient: [70, 60, 50]
  indoor_ambient: [55, 45, 35]
  has_day_night: false

legend:
  # Text row 0 maps to world y=0 (Bevy +y = north), so the FIRST line of
  # the `tiles` block is the SOUTH wall and the LAST line is the NORTH wall.
  "S": wall_s
  "N": wall_n
  "E": wall_e
  "W": wall_w
  "a": wall_corner_sw
  "b": wall_corner_se
  "c": wall_corner_nw
  "d": wall_corner_ne

tiles: |
  aSSSS.SSSSSb
  W..........E
  W..........E
  W..........E
  W..........E
  W..........E
  W..........E
  W..........E
  W..........E
  cNNNNNNNNNNd

portals:
  - id: cellar_exit
    source: { x: 5, y: 0 }
    destination_space_id: overworld
    destination_tile: { x: 6, y: 18 }
    destination_permanence: persistent

spawn_groups:
  - id: cellar_rats
    template: rat
    max_count: 3
    respawn_mean_seconds: 30.0
    area:
      bounds: { min_x: 1, min_y: 1, max_x: 10, max_y: 8 }
    behavior:
      kind: roam_and_chase
      bounds: { min_x: 1, min_y: 1, max_x: 10, max_y: 8 }

objects:
  # Stateful-object sandbox: door at the west wall, lever wired to it from
  # the east, two torches flanking the entry, and a chest near the door.
  - id: cellar_inner_door
    type: wooden_door
    placement: { x: 6, y: 5 }

  - type: torch
    placement: { x: 1, y: 1 }
  - type: torch
    placement: { x: 10, y: 1 }

  - type: iron_chest
    placement: { x: 8, y: 8 }
    contents:
      - type: apple
      - type: potion

  - type: lever
    placement: { x: 9, y: 5 }
    properties:
      target: cellar_inner_door
