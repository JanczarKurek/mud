authored_id: starter_cellar
permanence: ephemeral
width: 12
height: 10
fill_floor_type: grass
lighting:
  outdoor_ambient: [70, 60, 50]
  indoor_ambient: [55, 45, 35]
  has_day_night: false

legend:
  "#": wall

tiles: |
  #####.######
  #..........#
  #..........#
  #..........#
  #..........#
  #..........#
  #..........#
  #..........#
  #..........#
  ############

portals:
  - id: cellar_exit
    source: { x: 5, y: 0 }
    destination_space_id: overworld
    destination_tile: { x: 6, y: 18 }
    destination_permanence: persistent

spawn_groups:
  - id: cellar_rats
    template: rat
    max_count: 3
    respawn_mean_seconds: 30.0
    area:
      bounds: { min_x: 1, min_y: 1, max_x: 10, max_y: 8 }
    behavior:
      kind: roam_and_chase
      detect_distance_tiles: 4
      disengage_distance_tiles: 6
      step_interval_seconds: 0.5
      bounds: { min_x: 1, min_y: 1, max_x: 10, max_y: 8 }

objects:
  # Stateful-object sandbox: door at the west wall, lever wired to it from
  # the east, two torches flanking the entry, and a chest near the door.
  - id: cellar_inner_door
    type: wooden_door
    placement: { x: 6, y: 5 }

  - type: torch
    placement: { x: 1, y: 1 }
  - type: torch
    placement: { x: 10, y: 1 }

  - type: iron_chest
    placement: { x: 8, y: 8 }
    contents:
      - type: apple
      - type: potion

  - type: lever
    placement: { x: 9, y: 5 }
    properties:
      target: cellar_inner_door
